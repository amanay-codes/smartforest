{% extends 'incidents/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-tree fa-3x" style="color: #2d6a4f;"></i>
                <h3 class="mt-2 fw-bold">Smart Forest IMS</h3>
                <p class="text-muted">Sign in to your account</p>
            </div>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-forest w-100 py-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>
            <hr>
            <p class="text-center mb-0">Don't have an account? 
                <a href="{% url 'register' %}" style="color: #2d6a4f;">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
